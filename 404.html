<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/generated/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/generated/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/generated/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/generated/icon-512.png">
  <title>Page Not Found — Precise3D</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/design-tokens.css">
  <style>.error-page{min-height:70vh;display:flex;align-items:center;justify-content:center;text-align:center}.error-code{font-size:clamp(5rem,15vw,10rem);font-weight:900;color:var(--color-accent-glow);font-family:var(--font-mono);line-height:1;opacity:.3;margin-bottom:var(--space-4)}.error-links{display:flex;gap:var(--space-4);justify-content:center;flex-wrap:wrap;margin-top:var(--space-8)}</style>
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="/" class="logo"><img src="/generated/logo-header.png" alt="Precise3D" width="140" height="28"></a>
    <nav class="nav-main"><a href="/">Home</a><a href="/products/">Products</a><a href="/solutions/">Partner Programs</a><a href="/contact/">Contact</a></nav>
  </div>
</header>

<main>
  <section class="error-page">
    <div class="container">
      <div class="error-code">404</div>
      <h1 class="h1" style="margin-bottom:var(--space-4)">Page Not Found</h1>
      <p class="body-lg" style="color:var(--color-text-muted);max-width:450px;margin-inline:auto">The page you're looking for doesn't exist or has been moved. But the printer you're looking for might.</p>
      <div class="error-links">
        <a href="/" class="btn btn-primary">Go Home</a>
        <a href="/products/" class="btn btn-outline">View Products</a>
        <a href="/contact/" class="btn btn-outline">Contact Us</a>
      </div>
    </div>
  </section>
</main>

<footer class="site-footer section">
  <div class="container">
    <div class="footer-bottom"><p class="body-sm">&copy; 2026 Precise3D. All rights reserved.</p></div>
  </div>
</footer>

</body>
</html>
